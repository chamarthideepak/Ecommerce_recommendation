name: Tests & Code Quality

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Check imports
      run: |
        python -c "from src.data_loader import MovieLensDataLoader"
        python -c "from src.models.collaborative import UserBasedCF, ItemBasedCF"
        python -c "from src.models.matrix_factorization import SVDRecommender"
        python -c "from src.recommender import EnsembleRecommender, RecommendationSystem"
        python -c "from evaluation.metrics import rmse, mae, precision_at_k, recall_at_k, ndcg_at_k"
    
    - name: Check code style
      run: |
        python -m py_compile src/data_loader.py
        python -m py_compile src/feature_engineering.py
        python -m py_compile src/models/collaborative.py
        python -m py_compile src/models/matrix_factorization.py
        python -m py_compile src/recommender.py
        python -m py_compile evaluation/metrics.py
